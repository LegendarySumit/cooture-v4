services:
  - type: web
    name: cooture-backend
    env: node
    plan: free
    buildCommand: ""
    startCommand: "node server.js"
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        sync: false
      - key: GEMINI_API_URL
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: EMAIL_VERIFICATION_REQUIRED
        sync: false
      - key: SESSION_COOKIE_SECURE
        sync: false
      - key: SESSION_COOKIE_SAMESITE
        sync: false
