<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooture — Forgot Password</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/custom.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="auth-page">
    <div class="auth-layout">
        <div class="auth-left d-none d-lg-flex">
            <a href="index.html" class="auth-brand">Cooture</a>
            <div class="auth-left-content">
                <div class="auth-left-badge">Account Recovery</div>
                <h2 class="auth-left-title">Reset your password<br>safely.</h2>
                <p class="auth-left-sub">Enter your email and we will generate a secure reset link.</p>
            </div>
            <div class="auth-left-footer">© 2026 Cooture. All rights reserved.</div>
        </div>

        <div class="auth-right">
            <div class="auth-mobile-bar d-lg-none">
                <a href="index.html" class="auth-brand-mobile">Cooture</a>
            </div>

            <div class="auth-form-wrap">
                <div class="auth-form-header">
                    <h3 class="auth-form-title">Forgot Password</h3>
                    <p class="auth-form-sub">We will send reset instructions for your account</p>
                </div>

                <div class="mb-4">
                    <label class="auth-label">Email address</label>
                    <div class="auth-input-wrap">
                        <i class="bi bi-envelope auth-input-icon"></i>
                        <input id="forgotEmail" type="email" class="auth-input" placeholder="you@gmail.com" autocomplete="email">
                    </div>
                </div>

                <p id="forgotError" class="auth-error d-none"></p>
                <p id="forgotSuccess" class="auth-switch d-none"></p>

                <button id="forgotSubmit" type="button" class="auth-submit-btn">
                    Send Reset Link <i class="bi bi-arrow-right ms-1"></i>
                </button>

                <p class="auth-switch mt-3">
                    Back to <a href="login.html">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5000'
            : 'https://cooture-v4.onrender.com';

        function showMessage(message, isError) {
            const errorEl = document.getElementById('forgotError');
            const successEl = document.getElementById('forgotSuccess');
            errorEl.classList.add('d-none');
            successEl.classList.add('d-none');

            if (isError) {
                errorEl.textContent = message;
                errorEl.classList.remove('d-none');
                return;
            }

            successEl.textContent = message;
            successEl.classList.remove('d-none');
        }

        document.getElementById('forgotSubmit').addEventListener('click', async () => {
            const email = document.getElementById('forgotEmail').value.trim();
            if (!email) {
                showMessage('Please enter your email address.', true);
                return;
            }

            try {
                const res = await fetch(`${API}/auth/forgot-password`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (!res.ok) {
                    showMessage(data?.error?.message || 'Unable to process request.', true);
                    return;
                }

                const extra = data.resetUrl ? ` Reset link (dev): ${data.resetUrl}` : '';
                showMessage(`If the email exists, reset instructions were generated.${extra}`, false);
            } catch (error) {
                showMessage('Network error. Please try again.', true);
            }
        });
    </script>
</body>
</html>
