<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooture — Reset Password</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/custom.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="auth-page">
    <div class="auth-layout">
        <div class="auth-left d-none d-lg-flex">
            <a href="index.html" class="auth-brand">Cooture</a>
            <div class="auth-left-content">
                <div class="auth-left-badge">Security</div>
                <h2 class="auth-left-title">Choose a strong<br>new password.</h2>
                <p class="auth-left-sub">Your previous session will be revoked after password reset.</p>
            </div>
            <div class="auth-left-footer">© 2026 Cooture. All rights reserved.</div>
        </div>

        <div class="auth-right">
            <div class="auth-mobile-bar d-lg-none">
                <a href="index.html" class="auth-brand-mobile">Cooture</a>
            </div>

            <div class="auth-form-wrap">
                <div class="auth-form-header">
                    <h3 class="auth-form-title">Reset Password</h3>
                    <p class="auth-form-sub">Use at least 8 chars with upper, lower, number, symbol</p>
                </div>

                <div class="mb-4">
                    <label class="auth-label">New password</label>
                    <div class="auth-input-wrap">
                        <i class="bi bi-lock auth-input-icon"></i>
                        <input id="newPassword" type="password" class="auth-input" placeholder="••••••••" autocomplete="new-password">
                    </div>
                </div>

                <p id="resetError" class="auth-error d-none"></p>
                <p id="resetSuccess" class="auth-switch d-none"></p>

                <button id="resetSubmit" type="button" class="auth-submit-btn">
                    Reset Password <i class="bi bi-arrow-right ms-1"></i>
                </button>

                <p class="auth-switch mt-3">
                    Back to <a href="login.html">Sign in</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5000'
            : 'https://cooture-v4.onrender.com';

        const token = new URLSearchParams(window.location.search).get('token');

        function showMessage(message, isError) {
            const errorEl = document.getElementById('resetError');
            const successEl = document.getElementById('resetSuccess');
            errorEl.classList.add('d-none');
            successEl.classList.add('d-none');

            if (isError) {
                errorEl.textContent = message;
                errorEl.classList.remove('d-none');
                return;
            }

            successEl.textContent = message;
            successEl.classList.remove('d-none');
        }

        document.getElementById('resetSubmit').addEventListener('click', async () => {
            const password = document.getElementById('newPassword').value;
            if (!token) {
                showMessage('Missing reset token. Please request a new link.', true);
                return;
            }
            if (!password) {
                showMessage('Please enter a new password.', true);
                return;
            }

            try {
                const res = await fetch(`${API}/auth/reset-password`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    showMessage(data?.error?.message || 'Unable to reset password.', true);
                    return;
                }

                showMessage('Password reset successful. Redirecting to login...', false);
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1400);
            } catch (error) {
                showMessage('Network error. Please try again.', true);
            }
        });
    </script>
</body>
</html>
